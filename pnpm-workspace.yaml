overrides:
  # jwks-rsa@4 (dep transitiva de firebase-admin) hace require('jose'), pero
  # jose@6 es solo-ESM y rompe en el runtime serverless (ERR_REQUIRE_ESM).
  # jose@5 expone CJS y mantiene las APIs usadas (importJWK/exportSPKI).
  jose: ^5.10.0
allowBuilds:
  '@firebase/util': true
  protobufjs: true
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - '@firebase/util'
  - protobufjs
  - sharp
  - unrs-resolver
